<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="leafOuter" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FF9922"/>
      <stop offset="100%" stop-color="#BB4400"/>
    </linearGradient>
    <linearGradient id="leafMid" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFBB44"/>
      <stop offset="100%" stop-color="#CC5500"/>
    </linearGradient>
    <linearGradient id="leafInner" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFCC66"/>
      <stop offset="100%" stop-color="#DD6600"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8800" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FF8800" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FF6600" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="96" fill="#0D0D0D"/>

  <!-- Subtle glow behind canopy -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <g filter="url(#shadow)">
    <!-- Outer leaves -->
    <path d="M 256.0 256.0 C 299.5 284.8, 357.5 270.4, 401.0 256.0 C 357.5 241.6, 299.5 227.2, 256.0 256.0 Z" fill="url(#leafOuter)"/>
    <path d="M 256.0 256.0 C 266.4 307.1, 317.6 338.0, 358.5 358.5 C 338.0 317.6, 307.1 266.4, 256.0 256.0 Z" fill="url(#leafOuter)"/>
    <path d="M 256.0 256.0 C 227.2 299.5, 241.6 357.5, 256.0 401.0 C 270.4 357.5, 284.8 299.5, 256.0 256.0 Z" fill="url(#leafOuter)"/>
    <path d="M 256.0 256.0 C 204.9 266.4, 174.0 317.6, 153.5 358.5 C 194.4 338.0, 245.6 307.1, 256.0 256.0 Z" fill="url(#leafOuter)"/>
    <path d="M 256.0 256.0 C 212.5 227.2, 154.5 241.6, 111.0 256.0 C 154.5 270.4, 212.5 284.8, 256.0 256.0 Z" fill="url(#leafOuter)"/>
    <path d="M 256.0 256.0 C 245.6 204.9, 194.4 174.0, 153.5 153.5 C 174.0 194.4, 204.9 245.6, 256.0 256.0 Z" fill="url(#leafOuter)"/>
    <path d="M 256.0 256.0 C 284.8 212.5, 270.4 154.5, 256.0 111.0 C 241.6 154.5, 227.2 212.5, 256.0 256.0 Z" fill="url(#leafOuter)"/>
    <path d="M 256.0 256.0 C 307.1 245.6, 338.0 194.4, 358.5 153.5 C 317.6 174.0, 266.4 204.9, 256.0 256.0 Z" fill="url(#leafOuter)"/>

    <!-- Middle leaves -->
    <path d="M 256.0 256.0 C 277.8 289.7, 322.8 296.0, 357.6 298.1 C 331.5 274.9, 295.2 247.6, 256.0 256.0 Z" fill="url(#leafMid)"/>
    <path d="M 256.0 256.0 C 247.6 295.2, 274.9 331.5, 298.1 357.6 C 296.0 322.8, 289.7 277.8, 256.0 256.0 Z" fill="url(#leafMid)"/>
    <path d="M 256.0 256.0 C 222.3 277.8, 216.0 322.8, 213.9 357.6 C 237.1 331.5, 264.4 295.2, 256.0 256.0 Z" fill="url(#leafMid)"/>
    <path d="M 256.0 256.0 C 216.8 247.6, 180.5 274.9, 154.4 298.1 C 189.2 296.0, 234.2 289.7, 256.0 256.0 Z" fill="url(#leafMid)"/>
    <path d="M 256.0 256.0 C 234.2 222.3, 189.2 216.0, 154.4 213.9 C 180.5 237.1, 216.8 264.4, 256.0 256.0 Z" fill="url(#leafMid)"/>
    <path d="M 256.0 256.0 C 264.4 216.8, 237.1 180.5, 213.9 154.4 C 216.0 189.2, 222.3 234.2, 256.0 256.0 Z" fill="url(#leafMid)"/>
    <path d="M 256.0 256.0 C 289.7 234.2, 296.0 189.2, 298.1 154.4 C 274.9 180.5, 247.6 216.8, 256.0 256.0 Z" fill="url(#leafMid)"/>
    <path d="M 256.0 256.0 C 295.2 264.4, 331.5 237.1, 357.6 213.9 C 322.8 216.0, 277.8 222.3, 256.0 256.0 Z" fill="url(#leafMid)"/>

    <!-- Inner leaves -->
    <path d="M 256.0 256.0 C 277.6 272.8, 306.4 264.4, 328.0 256.0 C 306.4 247.6, 277.6 239.2, 256.0 256.0 Z" fill="url(#leafInner)"/>
    <path d="M 256.0 256.0 C 259.4 283.2, 285.7 297.6, 306.9 306.9 C 297.6 285.7, 283.2 259.4, 256.0 256.0 Z" fill="url(#leafInner)"/>
    <path d="M 256.0 256.0 C 239.2 277.6, 247.6 306.4, 256.0 328.0 C 264.4 306.4, 272.8 277.6, 256.0 256.0 Z" fill="url(#leafInner)"/>
    <path d="M 256.0 256.0 C 228.8 259.4, 214.4 285.7, 205.1 306.9 C 226.3 297.6, 252.6 283.2, 256.0 256.0 Z" fill="url(#leafInner)"/>
    <path d="M 256.0 256.0 C 234.4 239.2, 205.6 247.6, 184.0 256.0 C 205.6 264.4, 234.4 272.8, 256.0 256.0 Z" fill="url(#leafInner)"/>
    <path d="M 256.0 256.0 C 252.6 228.8, 226.3 214.4, 205.1 205.1 C 214.4 226.3, 228.8 252.6, 256.0 256.0 Z" fill="url(#leafInner)"/>
    <path d="M 256.0 256.0 C 272.8 234.4, 264.4 205.6, 256.0 184.0 C 247.6 205.6, 239.2 234.4, 256.0 256.0 Z" fill="url(#leafInner)"/>
    <path d="M 256.0 256.0 C 283.2 252.6, 297.6 226.3, 306.9 205.1 C 285.7 214.4, 259.4 228.8, 256.0 256.0 Z" fill="url(#leafInner)"/>
  </g>

  <!-- Center trunk dot -->
  <circle cx="256" cy="256" r="14" fill="#7A3200"/>
  <circle cx="256" cy="256" r="7" fill="#AA4800"/>

</svg>
