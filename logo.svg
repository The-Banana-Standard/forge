<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C33"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>
  <!-- Rounded background -->
  <g clip-path="url(#rounded)">
    <rect width="512" height="512" fill="#0D0D0D"/>
  </g>
  <rect width="512" height="512" rx="96" fill="#0D0D0D"/>
  <g transform="translate(256, 265)">
    <!-- Trunk - thick, slightly curved -->
    <path d="M-2 50 C-6 20, -6 -30, 0 -80" stroke="url(#glow)" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.85"/>
    <!-- Large leaves - broad banana-style with filled shapes -->
    <!-- Top-right leaf -->
    <path d="M0 -80 C20 -130, 70 -155, 105 -140 C70 -135, 25 -115, 0 -75" fill="url(#glow)"/>
    <!-- Top-left leaf -->
    <path d="M0 -80 C-20 -130, -70 -155, -105 -140 C-70 -135, -25 -115, 0 -75" fill="url(#glow)"/>
    <!-- Mid-right leaf -->
    <path d="M0 -75 C30 -110, 85 -115, 120 -85 C80 -90, 35 -85, 0 -65" fill="url(#glow)" opacity="0.75"/>
    <!-- Mid-left leaf -->
    <path d="M0 -75 C-30 -110, -85 -115, -120 -85 C-80 -90, -35 -85, 0 -65" fill="url(#glow)" opacity="0.75"/>
    <!-- Lower-right leaf (drooping) -->
    <path d="M0 -65 C35 -75, 90 -55, 115 -15 C80 -35, 35 -50, 0 -55" fill="url(#glow)" opacity="0.55"/>
    <!-- Lower-left leaf (drooping) -->
    <path d="M0 -65 C-35 -75, -90 -55, -115 -15 C-80 -35, -35 -50, 0 -55" fill="url(#glow)" opacity="0.55"/>
    <!-- Lowest right leaf (most droopy) -->
    <path d="M0 -58 C30 -40, 75 -10, 90 35 C65 5, 30 -20, 0 -45" fill="url(#glow)" opacity="0.35"/>
    <!-- Lowest left leaf (most droopy) -->
    <path d="M0 -58 C-30 -40, -75 -10, -90 35 C-65 5, -30 -20, 0 -45" fill="url(#glow)" opacity="0.35"/>
  </g>
</svg>
