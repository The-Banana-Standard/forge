<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8C33"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0D0D0D"/>
  <!-- Anvil shape - geometric/minimal -->
  <g transform="translate(256, 240)">
    <!-- Anvil top surface -->
    <rect x="-120" y="-60" width="240" height="40" rx="8" fill="url(#glow)"/>
    <!-- Anvil horn (left taper) -->
    <polygon points="-120,-60 -160,-44 -160,-28 -120,-20" fill="url(#glow)"/>
    <!-- Anvil body -->
    <rect x="-80" y="-20" width="160" height="80" rx="4" fill="url(#glow)" opacity="0.85"/>
    <!-- Anvil base -->
    <rect x="-110" y="60" width="220" height="32" rx="6" fill="url(#glow)" opacity="0.7"/>
    <!-- Spark lines -->
    <line x1="40" y1="-80" x2="60" y2="-110" stroke="#FF6B00" stroke-width="6" stroke-linecap="round"/>
    <line x1="70" y1="-70" x2="100" y2="-90" stroke="#FF6B00" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="-80" x2="0" y2="-115" stroke="#FF6B00" stroke-width="6" stroke-linecap="round"/>
    <!-- Spark dots -->
    <circle cx="60" cy="-115" r="4" fill="#FF8C33"/>
    <circle cx="102" cy="-93" r="3.5" fill="#FF8C33"/>
    <circle cx="0" cy="-120" r="4" fill="#FF8C33"/>
  </g>
</svg>
